services:
  - type: web
    name: intern-attendance
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PASSWORD_CODE_EMAIL
        sync: false
      - key: GMAIL_SENDER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
    disk:
      name: attendance-data
      mountPath: /var/data
      sizeGB: 1
